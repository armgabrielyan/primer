name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 0.1.0"
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            echo "Unable to determine release version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  release:
    needs: resolve-version
    uses: armgabrielyan/shared-workflows/.github/workflows/rust-release.yml@v1.0.0
    with:
      binary_name: primer
      release_version: ${{ needs.resolve-version.outputs.version }}
      release_repository: armgabrielyan/primer
      build_targets_json: >-
        [
          { "target": "x86_64-unknown-linux-gnu", "os": "ubuntu-latest", "archive": "tar.gz" },
          { "target": "x86_64-unknown-linux-musl", "os": "ubuntu-latest", "archive": "tar.gz" },
          { "target": "aarch64-unknown-linux-gnu", "os": "ubuntu-latest", "archive": "tar.gz", "cross": true },
          { "target": "x86_64-apple-darwin", "os": "macos-latest", "archive": "tar.gz" },
          { "target": "aarch64-apple-darwin", "os": "macos-latest", "archive": "tar.gz" },
          { "target": "x86_64-pc-windows-msvc", "os": "windows-latest", "archive": "zip" }
        ]
      publish_crates: true
      publish_npm: true
      publish_homebrew: true
      npm_working_directory: pkg/npm
      formula_name: primer
      main_repo_formula_path: pkg/homebrew/primer.rb
      tap_repository: armgabrielyan/homebrew-tap
      tap_formula_path: Formula/primer.rb
    secrets:
      cargo_registry_token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      homebrew_tap_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
