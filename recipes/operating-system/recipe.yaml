id: operating-system
title: Build Your Own Operating System
description: >
  From bare metal to a userspace shell in QEMU.
difficulty: advanced
stack:
  id: c-x86
  label: C + x86 Assembly
  tools:
    - nasm
    - gcc
    - qemu-system-i386
    - make
tracks:
  learner:
    description: Agent explains concepts and teaches while building.
  builder:
    description: Agent implements directly with minimal commentary.
milestones:
  - id: 01-bootloader
    title: Bootloader
    goal: Produce a boot sector that QEMU can execute and that prints a visible startup message.
    verification_summary: Verify that the disk image boots in QEMU and shows the expected bootloader output.
    expected_artifacts:
      - bootloader.asm
      - Makefile
    estimated_verify_minutes: 3
    split_if_stuck: Get one reliable boot message first before changing layout or build rules further.
    demo: QEMU boots and prints a bootloader message.
    prerequisites:
      - nasm
      - qemu-system-i386
      - make
  - id: 02-kernel-entry
    title: Kernel Entry Point
    goal: Transfer control cleanly from the bootloader into kernel entry code.
    verification_summary: Verify that QEMU shows evidence that the kernel entry path is executing.
    expected_artifacts:
      - bootloader.asm
      - kernel.c
      - linker.ld
    estimated_verify_minutes: 4
    split_if_stuck: Make the jump to kernel entry observable before refining linker or build structure.
    demo: Control passes from bootloader to kernel entry code.
    prerequisites:
      - nasm
      - qemu-system-i386
      - make
      - i686-elf-gcc
      - i686-elf-ld
  - id: 03-vga-output
    title: VGA Text Driver
    goal: Print kernel text directly through VGA memory.
    verification_summary: Verify that kernel text output appears through the VGA text buffer path.
    expected_artifacts:
      - kernel.c
      - vga.c
    estimated_verify_minutes: 3
    split_if_stuck: Hard-code one working text write first before abstracting the output helper.
    demo: Kernel prints text via VGA memory.
    prerequisites:
      - nasm
      - qemu-system-i386
      - make
      - i686-elf-gcc
      - i686-elf-ld
  - id: 04-interrupts
    title: GDT + Interrupts
    goal: Set up protected-mode tables and handle keyboard interrupts safely.
    verification_summary: Verify that keyboard input is delivered through the interrupt path.
    expected_artifacts:
      - gdt.c
      - idt.c
      - interrupts.c
    estimated_verify_minutes: 5
    split_if_stuck: Bring up one interrupt path end to end before broadening the handler setup.
    demo: Keyboard input is handled via IRQ.
    prerequisites:
      - nasm
      - qemu-system-i386
      - make
      - i686-elf-gcc
      - i686-elf-ld
  - id: 05-memory
    title: Memory Manager
    goal: Add a basic allocator with observable alloc/free behavior in the kernel.
    verification_summary: Verify that allocator operations behave correctly for the checked scenarios.
    expected_artifacts:
      - memory.c
      - kernel.c
    estimated_verify_minutes: 4
    split_if_stuck: Start with the smallest allocator behavior that passes one allocation case first.
    demo: Basic allocator alloc/free behavior is validated.
    prerequisites:
      - nasm
      - qemu-system-i386
      - make
      - i686-elf-gcc
      - i686-elf-ld
  - id: 06-scheduler
    title: Process Scheduler
    goal: Time-share execution between multiple processes with a round-robin scheduler.
    verification_summary: Verify that two runnable processes alternate under the scheduler.
    expected_artifacts:
      - scheduler.c
      - process.c
    estimated_verify_minutes: 5
    split_if_stuck: Get task switching working for two fixed processes before generalizing the scheduler.
    demo: Two processes time-share via round-robin.
    prerequisites:
      - nasm
      - qemu-system-i386
      - make
      - i686-elf-gcc
      - i686-elf-ld
  - id: 07-filesystem
    title: Simple Filesystem
    goal: Read structured file data from a disk image inside the kernel.
    verification_summary: Verify that the kernel can retrieve file contents from the filesystem image.
    expected_artifacts:
      - filesystem.c
      - disk.c
    estimated_verify_minutes: 5
    split_if_stuck: Validate one simple file read path first before broadening metadata parsing.
    demo: Kernel reads data from a disk image.
    prerequisites:
      - nasm
      - qemu-system-i386
      - make
      - i686-elf-gcc
      - i686-elf-ld
  - id: 08-shell
    title: Userspace Shell
    goal: Expose a minimal interactive shell on top of the kernel and filesystem work.
    verification_summary: Verify that the shell starts, accepts input, and runs the checked commands in QEMU.
    expected_artifacts:
      - shell.c
      - userspace/
    estimated_verify_minutes: 6
    split_if_stuck: Make one command loop work reliably before adding more shell behavior.
    demo: A basic interactive shell runs in QEMU.
    prerequisites:
      - nasm
      - qemu-system-i386
      - make
      - i686-elf-gcc
      - i686-elf-ld
