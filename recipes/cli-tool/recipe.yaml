id: cli-tool
title: Build a Task Tracker CLI
description: >
  Build a practical command-line task tracker in Python with persistent
  storage, workflow commands, and tests.
difficulty: beginner
stack:
  id: python-cli
  label: Python CLI
  tools:
    - python3
    - bash
tracks:
  learner:
    description: Agent explains CLI design and implementation choices while building.
  builder:
    description: Agent implements the CLI directly with minimal commentary.
milestones:
  - id: 01-bootstrap
    title: Bootstrap
    goal: Create the initial CLI entrypoint and persist tasks to a JSON file.
    verification_summary: Verify that a task can be added and listed back from persistent storage.
    expected_artifacts:
      - task_cli.py
      - tasks.json
    estimated_verify_minutes: 2
    split_if_stuck: Reduce scope to add plus list before touching any richer command behavior.
    demo: Add a task and list it back from a JSON file.
    prerequisites:
      - python3
      - bash
  - id: 02-complete
    title: Complete Tasks
    goal: Mark tasks complete and reflect that state in task output.
    verification_summary: Verify that done versus pending state is visible after completing a task.
    expected_artifacts:
      - task_cli.py
      - tasks.json
    estimated_verify_minutes: 2
    split_if_stuck: Get one task completion flow working end to end before refactoring command parsing.
    demo: Mark tasks done and show done versus pending state.
    prerequisites:
      - python3
      - bash
  - id: 03-edit-remove
    title: Edit and Remove
    goal: Update existing task titles and remove tasks by id safely.
    verification_summary: Verify that edited task content persists and removed tasks disappear cleanly.
    expected_artifacts:
      - task_cli.py
      - tasks.json
    estimated_verify_minutes: 3
    split_if_stuck: Make edit and remove pass in isolation before combining cleanup or helper refactors.
    demo: Update task titles and remove tasks by id.
    prerequisites:
      - python3
      - bash
  - id: 04-filters-tests
    title: Filters and Tests
    goal: Add status filtering, summary output, and a reliable test suite for the CLI.
    verification_summary: Verify that filters and summary behavior work and the unit tests pass.
    expected_artifacts:
      - task_cli.py
      - test_task_cli.py
    estimated_verify_minutes: 3
    split_if_stuck: Lock down one filter behavior first, then add summary and tests once the CLI output is stable.
    demo: Filter by task status, print a summary, and pass unit tests.
    prerequisites:
      - python3
      - bash
